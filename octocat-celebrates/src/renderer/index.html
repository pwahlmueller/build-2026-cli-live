<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self'" />
  <link rel="stylesheet" href="style.css" />
  <!-- Feature stylesheets (Phase 1, owned by individual feature agents) -->
  <link rel="stylesheet" href="features/goblin.css" />
  <link rel="stylesheet" href="features/visibility.css" />
  <link rel="stylesheet" href="features/timing.css" />
</head>
<body>
  <div id="stage">
    <button id="close" title="Close Octocat">×</button>
    <div id="bubble" class="bubble hidden"><span id="bubble-text"></span></div>
    <div id="octocat" class="idle">
      <div id="overlay"></div>
      <svg viewBox="0 0 100 110" width="160" height="176" xmlns="http://www.w3.org/2000/svg">
        <g id="cat-body">
          <ellipse cx="50" cy="58" rx="34" ry="32" fill="#24292f"/>
          <path d="M22 34 L30 14 L40 30 Z" fill="#24292f"/>
          <path d="M78 34 L70 14 L60 30 Z" fill="#24292f"/>
          <circle id="eye-left" cx="40" cy="54" r="6" fill="#ffffff"/>
          <circle id="eye-right" cx="60" cy="54" r="6" fill="#ffffff"/>
          <circle id="pupil-left" class="pupil" cx="40" cy="55" r="3" fill="#24292f"/>
          <circle id="pupil-right" class="pupil" cx="60" cy="55" r="3" fill="#24292f"/>
          <path d="M44 66 Q50 72 56 66" stroke="#ffffff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
          <ellipse cx="50" cy="96" rx="20" ry="8" fill="#24292f"/>
          <path id="tentacle" d="M70 88 Q92 90 88 70" stroke="#24292f" stroke-width="7" fill="none" stroke-linecap="round"/>
        </g>
      </svg>
    </div>
    <div id="confetti"></div>
  </div>
  <!-- Core MUST load before features so window.Octocat exists when they register. -->
  <script src="renderer.js"></script>
  <!-- Feature scripts (Phase 1, owned by individual feature agents) -->
  <script src="features/goblin.js"></script>
  <script src="features/sound.js"></script>
  <script src="features/eyes.js"></script>
</body>
</html>
